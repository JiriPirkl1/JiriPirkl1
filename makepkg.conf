DLAGENTS=('file::/usr/bin/curl -qgC - -o %o %u'
          'ftp::/usr/bin/curl -qgfC - --ftp-pasv --retry 3 --retry-delay 3 -o %o %u'
          'http::/usr/bin/curl -qgb "" -fLC - --retry 3 --retry-delay 3 -o %o %u'
          'https::/usr/bin/curl -qgb "" -fLC - --retry 3 --retry-delay 3 -o %o %u'
          'rsync::/usr/bin/rsync --no-motd -z %u %o'
          'scp::/usr/bin/scp -C %u %o')
VCSCLIENTS=('bzr::breezy'
            'fossil::fossil'
            'git::git'
            'hg::mercurial'
            'svn::subversion')
CARCH="x86_64"
CHOST="x86_64-pc-linux-gnu"
CC="clang"
CXX="clang++"
CPPFLAGS="$CFLAGS"
CFLAGS="-march=native -mtune=native -O3 -pipe -fno-plt -fexceptions -fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"
CXXFLAGS="$CFLAGS"
LDFLAGS="-Wl,-O3 -Wl,--sort-common -Wl,--as-needed -Wl,-fuse-ld=mold"
RUSTFLAGS="-C target-cpu=native -C opt-level=3 -C lto -C linker-plugin-lto -C link-arg=-fuse-ld=mold"
LTOFLAGS="-flto -fuse-linker-plugin"
MAKEFLAGS="-j$(nproc)"
NINJAFLAGS="-j$(nproc)"
BUILDENV=(!distcc !color !ccache !check !sign)
OPTIONS=(strip !docs !libtool !staticlibs !emptydirs !debug zipman purge lto)
INTEGRITY_CHECK=(sha256)
STRIP_BINARIES="--strip-all --strip-unneeded --strip-debug"
STRIP_SHARED="$STRIP_BINARIES"
STRIP_STATIC="$STRIP_BINARIES"
MAN_DIRS=({usr{,/local}{,/share},opt/*}/{man,info})
DOC_DIRS=(usr/{,local/}{,share/}{doc,gtk-doc} opt/*/{doc,gtk-doc})
PURGE_TARGETS=(usr/{,share}/info/dir .packlist *.pod)
DBGSRCDIR="/usr/src/debug"
LIB_DIRS=('lib:usr/lib' 'lib32:usr/lib32')
COMPRESSGZ=(gzip -c -f -n)
COMPRESSBZ2=(bzip2 -c -f)
COMPRESSXZ=(xz -c -z -)
COMPRESSZST=(zstd -c -T0 -)
COMPRESSLRZ=(lrzip -q)
COMPRESSLZO=(lzop -q)
COMPRESSZ=(compress -c -f)
COMPRESSLZ4=(lz4 -q)
COMPRESSLZ=(lzip -c -f)
PKGEXT='.pkg.tar.zst'
SRCEXT='.src.tar.gz'
